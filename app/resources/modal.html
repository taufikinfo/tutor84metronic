<!--[main]-->
<div class="card panel panel-default">
    <div class="card-header panel-heading d-flex align-items-center justify-content-between">
        <div class="card-title panel-title mb-0" style="margin:0;"> {$title} </div>
        <div class="header-actions">
            <div class="btn btn-sm btn-danger px-3 py-2 text-white" style="cursor:pointer;" id="close-modal"> Close </div>
        </div>
    </div>
    <div class="card-body panel-body">
        <blockquote>
          <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Integer posuere erat a ante.</p>
          <footer> <b>{$name}</b> in <cite title="Source Title">Source Title</cite></footer>
        </blockquote>
    </div>
    <div class="card-footer panel-footer"> {$footer} </div>
</div>

<script>
$('#close-modal').click( function() {
    $('[widget="TWindow"]').remove();
});
</script>

<!--[/main]-->
